# Development Docker Compose - Hot Reload Enabled
# Integrated with shared-docker-infra via Traefik
services:
  # ===========================================
  # Go Backend with Hot Reload
  # ===========================================
  go-backend:
    build:
      context: ./go-backend
      dockerfile: Dockerfile.dev
    container_name: orchestrator-go-dev
    environment:
      - SERVER_PORT=3847
      - DATABASE_URL=/data/orchestrator.db
      - JULES_API_KEY=${JULES_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PYTHON_SERVICE_URL=http://python-agent:8080
      - LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-http://litellm.local}
    volumes:
      - ./go-backend:/app
      - ./projects:/app/projects
      - ./data:/data
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
    depends_on:
      - python-agent
    networks:
      - shared-infra
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator-api-dev.rule=Host(`orchestrator.${INFRA_DOMAIN:-local}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.orchestrator-api-dev.entrypoints=http"
      - "traefik.http.services.orchestrator-api-dev.loadbalancer.server.port=3847"

  # ===========================================
  # Python Deep Agent Service with Hot Reload
  # ===========================================
  python-agent:
    build:
      context: ./python-agent
      dockerfile: Dockerfile.dev
    container_name: orchestrator-python-dev
    environment:
      - PYTHON_SERVICE_PORT=8080
      - DEEP_AGENT_MODEL=${DEEP_AGENT_MODEL:-gpt-4o}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
    volumes:
      - ./python-agent:/app
      - ./projects:/app/projects
    networks:
      - shared-infra

  # ===========================================
  # React Frontend (Vite Dev Server)
  # ===========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: orchestrator-frontend-dev
    environment:
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5194
      - VITE_API_URL=/api
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - shared-infra
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator-dev.rule=Host(`orchestrator.${INFRA_DOMAIN:-local}`)"
      - "traefik.http.routers.orchestrator-dev.entrypoints=http"
      - "traefik.http.services.orchestrator-dev.loadbalancer.server.port=5194"
      - "traefik.http.routers.orchestrator-dev.priority=1"

networks:
  shared-infra:
    external: true
    name: ${SHARED_NETWORK_NAME:-shared-infra}
