# Development Docker Compose with Hot Reload
# Integrated with shared-docker-infra via Traefik
services:
  # Node.js/TypeScript Server with Vite Hot Reload
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: auto-dev-orchestrator
    # No ports exposed - access via Traefik
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Prevent node_modules from being overwritten
      - /app/node_modules
      # Mount projects directory for local development
      - ./projects:/app/projects
      # SSH keys for Git operations (optional)
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
    environment:
      - NODE_ENV=development
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5194
      - SERVER_PORT=3847
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - APP_URL=${APP_URL:-http://orchestrator.local}
      # Shared infrastructure
      - LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-http://litellm.local}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse.local}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    networks:
      - shared-infra
    restart: unless-stopped
    # Traefik labels for development access
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator-dev.rule=Host(`orchestrator.${INFRA_DOMAIN:-local}`)"
      - "traefik.http.routers.orchestrator-dev.entrypoints=http"
      - "traefik.http.services.orchestrator-dev.loadbalancer.server.port=5194"
      - "traefik.http.routers.orchestrator-dev.priority=10"

networks:
  shared-infra:
    external: true
    name: ${SHARED_NETWORK_NAME:-shared-infra}
