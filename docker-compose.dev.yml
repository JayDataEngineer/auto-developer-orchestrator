# Development Docker Compose with Hot Reload
services:
  # Node.js/TypeScript Server with Vite Hot Reload
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: auto-dev-orchestrator
    ports:
      - "3847:3847"
      - "5194:5194"
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Prevent node_modules from being overwritten
      - /app/node_modules
      # Mount projects directory for local development
      - ./projects:/app/projects
      # SSH keys for Git operations (optional)
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
    environment:
      - NODE_ENV=development
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5194
      - SERVER_PORT=3847
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - APP_URL=${APP_URL:-http://localhost:3847}
    depends_on:
      - langgraph-agent
    networks:
      - orchestrator-network

  # Python LangGraph Microservice with Deep Agents
  langgraph-agent:
    image: langchain/langgraph-api:3.12
    container_name: langgraph-agent
    working_dir: /app
    volumes:
      # Mount Python agent code for hot reload
      - ./python_agent:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8194:8194"
    command: >
      sh -c "
        pip install --no-cache-dir deepagents uvicorn fastapi &&
        python -m uvicorn agent:app --host 0.0.0.0 --port 8194 --reload
      "
    networks:
      - orchestrator-network

networks:
  orchestrator-network:
    driver: bridge
