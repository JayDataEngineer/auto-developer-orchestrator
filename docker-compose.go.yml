# Production Docker Compose - Integrated with shared-docker-infra
# Uses Traefik from shared infrastructure for routing
# Connects to shared LiteLLM and Langfuse for AI and observability
services:
  # ===========================================
  # Go Backend API Server
  # ===========================================
  go-backend:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
    container_name: orchestrator-go
    # No ports exposed - all access via Traefik
    environment:
      - SERVER_PORT=3847
      - DATABASE_URL=/data/orchestrator.db
      - JULES_API_KEY=${JULES_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PYTHON_SERVICE_URL=http://python-agent:8080
      # Use shared LiteLLM via Traefik
      - LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-http://litellm.local}
      # Langfuse observability (via shared infra)
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse.local}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ./projects:/app/projects
      - ./data:/data
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
    depends_on:
      - python-agent
    networks:
      - shared-infra
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3847/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Traefik labels for automatic routing
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=Host(`orchestrator.${INFRA_DOMAIN:-local}`)"
      - "traefik.http.routers.orchestrator.entrypoints=http"
      - "traefik.http.routers.orchestrator.middlewares=security-headers@file"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=3847"
      # OCI-compliant labels for state management
      - "com.localai.service=orchestrator"
      - "com.localai.service.type=control-plane"
      - "com.localai.service.description=Auto-developer orchestrator control plane"
      - "com.localai.managed=true"
      - "com.localai.auto_expiry=false"

  # ===========================================
  # Python Deep Agent Service
  # ===========================================
  python-agent:
    build:
      context: ./python-agent
      dockerfile: Dockerfile
    container_name: orchestrator-python
    # No ports exposed - internal only
    environment:
      - PYTHON_SERVICE_PORT=8080
      - DEEP_AGENT_MODEL=${DEEP_AGENT_MODEL:-gpt-4o}
      - DEEP_AGENT_BASE_URL=${DEEP_AGENT_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      # Langfuse observability
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse.local}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ./projects:/app/projects
    networks:
      - shared-infra
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  shared-infra:
    external: true
    name: ${SHARED_NETWORK_NAME:-shared-infra}

volumes:
  projects:
  data:
