# Development Docker Compose - Hot Reload Enabled
# Integrated with shared-docker-infra via Traefik
services:
  # ===========================================
  # Go Backend with Hot Reload
  # ===========================================
  go-backend:
    build:
      context: ./go-backend
      dockerfile: Dockerfile.dev
    container_name: orchestrator-go-dev
    # No ports exposed - access via Traefik
    environment:
      - SERVER_PORT=3847
      - DATABASE_URL=/data/orchestrator.db
      - JULES_API_KEY=${JULES_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PYTHON_SERVICE_URL=http://python-agent:8080
      # Use shared LiteLLM via Traefik
      - LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-http://litellm.local}
      # Langfuse observability
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse.local}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ./go-backend:/app
      - ./projects:/app/projects
      - ./data:/data
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
    depends_on:
      - python-agent
    networks:
      - shared-infra
    command: ["air", "-c", ".air.toml"] # Hot reload with air
    # Traefik labels for development access
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator-go-dev.rule=Host(`orchestrator-go.${INFRA_DOMAIN:-local}`)"
      - "traefik.http.routers.orchestrator-go-dev.entrypoints=http"
      - "traefik.http.services.orchestrator-go-dev.loadbalancer.server.port=3847"
      - "traefik.http.routers.orchestrator-go-dev.priority=10"

  # ===========================================
  # Python Deep Agent Service with Hot Reload
  # ===========================================
  python-agent:
    build:
      context: ./python-agent
      dockerfile: Dockerfile.dev
    container_name: orchestrator-python-dev
    # No ports exposed - internal only
    environment:
      - PYTHON_SERVICE_PORT=8080
      - DEEP_AGENT_MODEL=${DEEP_AGENT_MODEL:-gpt-4o}
      - DEEP_AGENT_BASE_URL=${DEEP_AGENT_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      # Langfuse observability
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse.local}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ./python-agent:/app
      - ./projects:/app/projects
    networks:
      - shared-infra
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]

  # ===========================================
  # React Frontend (Vite Dev Server)
  # ===========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: orchestrator-frontend-dev
    # No ports exposed - access via Traefik
    environment:
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5194
      - VITE_API_URL=http://orchestrator.local/api
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - shared-infra
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5194"]
    # Traefik labels for frontend access
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator-frontend.rule=Host(`orchestrator.${INFRA_DOMAIN:-local}`)"
      - "traefik.http.routers.orchestrator-frontend.entrypoints=http"
      - "traefik.http.services.orchestrator-frontend.loadbalancer.server.port=5194"
      - "traefik.http.routers.orchestrator-frontend.priority=5"

networks:
  shared-infra:
    external: true
    name: ${SHARED_NETWORK_NAME:-shared-infra}
